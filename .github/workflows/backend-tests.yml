name: Backend Continuous Testing

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-tests.yml"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  test-matrix:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"
          cache-dependency-path: "./backend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: make test

  coverage-and-build-readiness:
    name: Coverage, Typecheck & Build Readiness
    runs-on: ubuntu-latest
    needs: test-matrix
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: "./backend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify formatting
        run: make format-check

      - name: Verify linting
        run: make lint

      - name: Verify type checking
        run: make typecheck

      - name: Generate coverage report
        run: make test-cov

      - name: Verify production build
        run: make build

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage
          if-no-files-found: error
          retention-days: 7
