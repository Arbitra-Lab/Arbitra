apiVersion: v1
kind: ServiceAccount
metadata:
  name: arbitra-backend
  namespace: production
  labels:
    app: arbitra-backend

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arbitra-backend
  namespace: production
  labels:
    app: arbitra-backend
rules:
  - apiGroups: ['']
    resources: ['configmaps']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['']
    resources: ['secrets']
    verbs: ['get', 'list']
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list']

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arbitra-backend
  namespace: production
  labels:
    app: arbitra-backend
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arbitra-backend
subjects:
  - kind: ServiceAccount
    name: arbitra-backend
    namespace: production
