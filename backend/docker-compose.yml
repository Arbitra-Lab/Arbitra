version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arbitra_db
    restart: always
    command: postgres -c shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arbitra_db
    ports:
      - '5433:5432'
    volumes:
      - arbitra_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arbitra_redis
    restart: always
    ports:
      - '6379:6379'

volumes:
  arbitra_postgres_data:
